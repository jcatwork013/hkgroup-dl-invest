# ---------------------------------------------------------------------------
# duoclieuhk.vn (+ www) → HK Next.js investment app on 127.0.0.1:13000
# Same-origin API: /api/* proxied to the backend (127.0.0.1:18080).
# (Previously served a static "Coming Soon" page — backup kept alongside.)
# TLS: Let's Encrypt origin cert — Cloudflare SSL "Full (strict)" compatible.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name duoclieuhk.vn www.duoclieuhk.vn;

    ssl_certificate     /etc/letsencrypt/live/duoclieuhk.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/duoclieuhk.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 15m;

    location /api/ {
        proxy_pass         http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 15s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:13000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass         http://127.0.0.1:13000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout    60s;
        proxy_connect_timeout 30s;
    }

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

server {
    listen 80;
    listen [::]:80;
    server_name duoclieuhk.vn www.duoclieuhk.vn;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}
