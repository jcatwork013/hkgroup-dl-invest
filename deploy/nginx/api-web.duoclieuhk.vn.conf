# ---------------------------------------------------------------------------
# api-web.duoclieuhk.vn → HK invest backend API container on 127.0.0.1:18080
# (Primary API host for the web app. api.duoclieuhk.vn is reserved for the
#  separate product/order sync system.)
# TLS: Let's Encrypt origin cert — Cloudflare SSL "Full (strict)" compatible.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name api-web.duoclieuhk.vn;

    ssl_certificate     /etc/letsencrypt/live/api-web.duoclieuhk.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-web.duoclieuhk.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 15m;

    location / {
        proxy_pass         http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 15s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api-web.duoclieuhk.vn;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}
